<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirka Community Hub - Maps</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <meta name="description" content="Browse and download all Kirka.io custom maps. Find your favourite map JSON files from the Kirka Community Hub.">
    <meta name="keywords" content="Kirka.io maps, Kirka custom maps, Kirka map download, Kirka Community Hub">
    <meta name="author" content="imnotkoolkid">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://kirkacommunityhub.pages.dev/maps.html">
    <meta property="og:title" content="Kirka Community Hub - Maps">
    <meta property="og:description" content="Browse and download all Kirka.io custom maps from the Kirka Community Hub.">
    <meta property="og:image" content="https://kirkacommunityhub.pages.dev/assets/icon.png">
    <meta property="og:url" content="https://kirkacommunityhub.pages.dev/maps.html">
    <meta property="og:type" content="website">
    <meta name="theme-color" content="#1bd96a">
    <style>
        :root {
            --green: #1bd96a;
            --green-hover: #14b858;
            --bg: #0e1217;
            --card-bg: #161b22;
            --border: #30363d;
            --text: #fff;
            --text-muted: #a4b1cd;
            --header-bg: rgba(14, 18, 23, 0.82);
            --font: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        a { text-decoration: none; color: inherit; }

        header {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 99%;
            z-index: 1000;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            height: 62px;
            border-radius: 5px;
            border: 1px solid rgba(48,54,61,0.5);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
            font-weight: 800;
            font-size: 1.1rem;
        }

        .logo img { width: 32px; height: 32px; }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: .9rem;
            font-weight: 600;
            transition: color .2s;
        }

        .nav-link:hover { color: var(--text); }
        .nav-link svg { width: 16px; height: 16px; }

        main {
            flex: 1;
            padding-top: 100px;
            padding-bottom: 80px;
        }

        .page-header {
            text-align: center;
            padding: 20px 24px 0;
            margin-bottom: 36px;
        }

        .page-header h1 {
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 1rem;
            max-width: 480px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .search-wrap {
            max-width: 600px;
            margin: 0 auto 48px;
            padding: 0 20px;
            position: relative;
        }

        .search-icon-pos {
            position: absolute;
            left: 36px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .search-icon-pos svg { width: 17px; height: 17px; stroke-width: 2.5; }

        #search {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border-radius: 50px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 1rem;
            font-family: var(--font);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }

        #search:focus {
            border-color: rgba(27, 217, 106, 0.5);
            box-shadow: 0 0 0 3px rgba(27, 217, 106, 0.08);
        }

        #search::placeholder { color: var(--text-muted); }

        .maps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .map-card {
            border-radius: 14px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--border);
            transition: transform .22s cubic-bezier(.34,1.56,.64,1), border-color .2s, box-shadow .2s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .map-card:hover {
            transform: translateY(-5px) scale(1.015);
            border-color: rgba(27, 217, 106, 0.55);
            box-shadow: 0 12px 40px rgba(27, 217, 106, 0.08);
        }

        .map-card-img-wrap {
            width: 100%;
            aspect-ratio: 16/9;
            overflow: hidden;
            background: #111519;
            position: relative;
        }

        .map-card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .4s ease;
        }

        .map-card:hover .map-card-img { transform: scale(1.06); }

        .map-card-img-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, #1a1f29 25%, #222838 50%, #1a1f29 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            z-index: 0;
            opacity: 1;
            transition: opacity .3s;
        }

        .map-card-img-wrap.loaded::before { opacity: 0; }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .map-card-body {
            padding: 13px 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .map-card-name {
            font-size: .92rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .map-card-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            transition: all .2s;
        }

        .btn-icon:hover { 
            background: rgba(255, 255, 255, 0.07); 
            color: var(--text); 
        }

        .btn-icon svg { width: 16px; height: 16px; stroke-width: 2.5; }

        .toast-container {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 10px 20px;
            font-size: .87rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            animation: toastIn .25s ease, toastOut .3s ease 1.8s forwards;
        }

        .toast svg { width: 15px; height: 15px; color: var(--green); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; transform: translateY(8px); }
        }

        .preview-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(8, 10, 16, 0.85);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease;
        }

        .preview-overlay.visible { opacity: 1; pointer-events: all; }

        .preview-modal {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: 100%;
            max-width: 860px;
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
            transform: translateY(20px) scale(0.97);
            transition: transform .25s ease;
            position: relative;
        }

        .preview-overlay.visible .preview-modal { transform: translateY(0) scale(1); }
        .preview-modal::-webkit-scrollbar { width: 6px; }
        .preview-modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .preview-img-section {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 20px 20px 0 0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-main-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            user-select: none;
        }

        .preview-body { padding: 22px 26px 26px; }

        .preview-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 22px;
        }

        .preview-title-block { display: flex; align-items: baseline; gap: 12px; }
        .preview-title { font-size: 1.5rem; font-weight: 800; color: var(--text); margin-bottom: 0; }

        .preview-actions { display: flex; gap: 10px; flex-wrap: wrap; }

        .preview-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            font-size: .88rem;
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            transition: all .2s;
            text-decoration: none;
        }

        .preview-btn svg { width: 15px; height: 15px; stroke-width: 2.5; }
        .preview-btn:hover { background: rgba(255, 255, 255, 0.07); color: var(--text); border-color: rgba(255, 255, 255, 0.15); }
        .preview-btn.primary { background: rgba(27, 217, 106, 0.12); color: var(--green); border-color: rgba(27, 217, 106, 0.3); }
        .preview-btn.primary:hover { background: rgba(27, 217, 106, 0.22); border-color: rgba(27, 217, 106, 0.5); }

        #no-results {
            display: none;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }

        #no-results svg { width: 48px; height: 48px; opacity: .4; margin-bottom: 16px; }
        #no-results h3 { font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }

        .page-loader {
            display: flex;
            justify-content: center;
            padding: 80px 0;
        }

        .loader {
            width: 48px;
            aspect-ratio: 1.154;
            background: conic-gradient(from 120deg at 50% 64%, #0000, var(--green) 1deg 120deg, #0000 121deg);
            animation: l27-0 1.5s infinite cubic-bezier(0.3, 1, 0, 1);
            position: relative;
        }

        .loader:before, .loader:after {
            content: '';
            position: absolute;
            inset: 0;
            background: inherit;
            transform-origin: 50% 66%;
            animation: l27-1 1.5s infinite;
        }

        .loader:after { --s: -1; }

        @keyframes l27-0 {
            0%, 30% { transform: rotate(0); }
            70% { transform: rotate(120deg); }
            70.01%, 100% { transform: rotate(360deg); }
        }

        @keyframes l27-1 {
            0% { transform: rotate(calc(var(--s,1)*120deg)) translate(0); }
            30%, 70% { transform: rotate(calc(var(--s,1)*120deg)) translate(calc(var(--s,1)*-5px),10px); }
            100% { transform: rotate(calc(var(--s,1)*120deg)) translate(0); }
        }

        footer {
            background: #050608;
            padding: 60px 0;
            border-top: 1px solid var(--border);
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2rem;
        }

        .footer-logo { display: flex; align-items: center; gap: 7px; font-weight: 700; margin-bottom: 20px; }
        .footer-logo img { width: 30px; }
        .footer-links h4 { margin-bottom: 16px; color: var(--text); }
        .footer-links ul { list-style: none; }
        .footer-links li { margin-bottom: 10px; }
        .footer-links a { color: var(--text-muted); font-size: 0.9rem; }
        .footer-links a:hover { color: var(--green); text-decoration: underline; }
        .footer-links-wrapper { display: flex; gap: 40px; }

        @media (max-width: 768px) {
            .footer-content { flex-direction: column; }
            .footer-links-wrapper { flex-direction: column; gap: 20px; }
            .maps-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .map-card { animation: cardIn .35s ease both; }
    </style>
</head>

<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="assets/icon.png" onerror="this.style.display='none'">
                <span>Kirka Community Hub</span>
            </a>
            <nav>
                <a href="index.html" class="nav-link"><i data-lucide="chevron-left"></i> Back</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="search-wrap">
            <div class="search-icon-pos"><i data-lucide="search"></i></div>
            <input id="search" type="text" placeholder="Search maps…" autocomplete="off" spellcheck="false">
        </div>



        <div id="loader-wrap" class="page-loader"><div class="loader"></div></div>

        <div class="maps-grid" id="maps-grid"></div>

            <p>Try a different search term.</p>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div>
                <a href="index.html" class="footer-logo">
                    <img src="assets/icon.png">
                    <span>Kirka Community Hub</span>
                </a>
                <p style="color:var(--text-muted);font-size:.9rem;max-width:300px">
                    Not affiliated with Kirka.io.<br>Built by the community, for the community.
                </p>
            </div>
            <div class="footer-links-wrapper">
                <div class="footer-links">
                    <h4>Resources</h4>
                    <ul>
                        <li><a href="https://github.com/imnotkoolkid/kch" target="_blank" rel="noopener noreferrer">github</a></li>
                        <li><a href="api.html">api</a></li>
                    </ul>
                </div>
                <div class="footer-links">
                    <h4>Community</h4>
                    <ul>
                        <li><a href="contribution.html">contribution</a></li>
                        <li><a href="submit-content.html">Submit Content</a></li>
                    </ul>
                </div>
                <div class="footer-links">
                    <h4>Legal</h4>
                    <ul>
                        <li><a href="tos.html">Terms Of Service</a></li>
                        <li><a href="report.html">Report</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>

    <div class="toast-container" id="toast-container"></div>

    <div class="preview-overlay" id="preview-overlay" onclick="handleOverlayClick(event)">
        <div class="preview-modal" id="preview-modal" onclick="event.stopPropagation()">
            <div class="preview-img-section loader-container">
                <img class="preview-main-img" id="preview-img" src="" alt="" draggable="false">
                <div class="loader"></div>
            </div>
            <div class="preview-body">
                <div class="preview-header">
                    <div class="preview-title-block">
                        <div class="preview-title" id="preview-title"></div>
                    </div>
                </div>
                <div class="preview-actions" id="preview-actions"></div>
            </div>
        </div>
    </div>

    <script>
        const JSON_URL = 'https://raw.githubusercontent.com/imnotkoolkid/KCH/refs/heads/main/data/maps.json';

        let allMaps = [];
        let cur = null;

        const titleToSlug = t => encodeURIComponent(t.trim().replace(/\s+/g, '-').toLowerCase());
        const slugToTitle = s => decodeURIComponent(s).replace(/-/g, ' ').toLowerCase();

        const showToast = (msg, icon = 'check') => {
            let t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<i data-lucide="${icon}"></i><span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(t);
            lucide.createIcons();
            setTimeout(() => t.remove(), 2200);
        };

        const handleDownload = (url, title) => {
            if (!url) return;
            fetch(url).then(r => r.ok ? r.text() : Promise.reject()).then(c => {
                let a = document.createElement('a'),
                    f = url.split('/').pop();
                if (!f || !f.endsWith('.json')) f = title.toLowerCase().replace(/[^a-z0-9]+/g, '_') + '.json';
                a.href = URL.createObjectURL(new Blob([c], { type: 'application/json' }));
                a.download = f;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            }).catch(() => showToast('Download failed.', 'alert-circle'));
        };

        const copyJSONFile = async url => {
            if (!url) return;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error('Failed to fetch');
                const text = await res.text();
                await navigator.clipboard.writeText(text);
                showToast('Map JSON copied to clipboard!');
            } catch {
                showToast('Failed to copy JSON.', 'alert-circle');
            }
        };

        const shareCurrentPage = () => {
            const slug = cur ? titleToSlug(cur.name) : '';
            const shareUrl = slug
                ? `${location.origin}/maps/${slug}`
                : location.href;

            navigator.clipboard.writeText(shareUrl)
                .then(() => showToast('Link copied to clipboard!'))
                .catch(() => showToast('Failed to copy link.', 'alert-circle'));
        };

        const openPreview = map => {
            cur = map;
            let img = document.getElementById('preview-img'),
                loader = document.querySelector('.preview-img-section .loader');
            
            loader.style.display = 'block';
            img.onload = () => loader.style.display = 'none';
            img.onerror = () => {
                loader.style.display = 'none';
                img.src = '';
                img.style.background = '#000';
            };
            img.src = map.img || '';
            
            document.getElementById('preview-title').textContent = map.name;
            
            let ac = document.getElementById('preview-actions');
            ac.innerHTML = `
                <button class="preview-btn primary" onclick="handleDownload('${map.downloadUrl}','${map.name.replace(/'/g, "\\'")}')">
                    <i data-lucide="download"></i> Download Map
                </button>
                <button class="preview-btn" onclick="copyJSONFile('${map.downloadUrl}')">
                    <i data-lucide="clipboard"></i> Copy Map
                </button>
                <button class="preview-btn" onclick="shareCurrentPage()">
                    <i data-lucide="share-2"></i> Share
                </button>
            `;
            
            document.getElementById('preview-overlay').classList.add('visible');
            document.body.style.overflow = 'hidden';
            lucide.createIcons();
            history.pushState({ previewOpen: true }, '', `#${titleToSlug(map.name)}`);
        };

        const closePreview = () => {
            document.getElementById('preview-overlay').classList.remove('visible');
            document.body.style.overflow = '';
            cur = null;
            history.pushState({ previewOpen: false }, '', location.pathname + location.search);
        };

        const handleOverlayClick = e => {
            if (e.target === document.getElementById('preview-overlay')) closePreview();
        };

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (document.getElementById('preview-overlay').classList.contains('visible')) closePreview();
            }
        });

        const handleHash = () => {
            let h = location.hash;
            if (!h || h.length < 2) return;

            let i = allMaps.find(m => m.name.toLowerCase() === slugToTitle(h.substring(1)));
            if (i) {
                openPreview(i);
            } else {
                history.pushState(null, '', location.pathname + location.search);
            }
        };

        window.addEventListener('popstate', () => {
            let h = location.hash;
            if (h && h.length > 1) {
                handleHash();
            } else {
                if (document.getElementById('preview-overlay').classList.contains('visible')) {
                    document.getElementById('preview-overlay').classList.remove('visible');
                    document.body.style.overflow = '';
                    cur = null;
                }
            }
        });

        function renderCards(maps) {
            const grid = document.getElementById('maps-grid');
            const noResults = document.getElementById('no-results');

            grid.innerHTML = '';

            if (maps.length === 0) {
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';

            maps.forEach((map, i) => {
                const card = document.createElement('div');
                card.className = 'map-card';
                card.style.animationDelay = `${Math.min(i * 0.03, 0.5)}s`;
                card.onclick = () => openPreview(map);

                const imgWrap = document.createElement('div');
                imgWrap.className = 'map-card-img-wrap';

                const img = document.createElement('img');
                img.className = 'map-card-img';
                img.alt = map.name;
                img.loading = 'lazy';
                img.src = map.img;
                img.style.position = 'relative';
                img.style.zIndex = '1';
                img.onload = () => imgWrap.classList.add('loaded');
                img.onerror = () => { imgWrap.classList.add('loaded'); img.style.opacity = '.4'; };

                imgWrap.appendChild(img);

                const body = document.createElement('div');
                body.className = 'map-card-body';

                const nameEl = document.createElement('div');
                nameEl.className = 'map-card-name';
                nameEl.textContent = map.name;
                nameEl.title = map.name;

                const actions = document.createElement('div');
                actions.className = 'map-card-actions';

                const dlBtn = document.createElement('div');
                dlBtn.className = 'btn-icon';
                dlBtn.title = 'Download Map';
                dlBtn.innerHTML = '<i data-lucide="download"></i>';
                dlBtn.onclick = e => {
                    e.stopPropagation();
                    handleDownload(map.downloadUrl, map.name);
                };

                const copyBtn = document.createElement('div');
                copyBtn.className = 'btn-icon';
                copyBtn.title = 'Copy Map JSON';
                copyBtn.innerHTML = '<i data-lucide="clipboard"></i>';
                copyBtn.onclick = e => {
                    e.stopPropagation();
                    copyJSONFile(map.downloadUrl);
                };

                actions.appendChild(dlBtn);
                actions.appendChild(copyBtn);

                body.appendChild(nameEl);
                body.appendChild(actions);
                card.appendChild(imgWrap);
                card.appendChild(body);
                grid.appendChild(card);
            });

            lucide.createIcons();
        }

        function filterMaps(query) {
            const q = query.trim().toLowerCase();
            if (!q) return allMaps;
            return allMaps.filter(m => m.name.toLowerCase().includes(q));
        }

        async function init() {
            try {
                const res = await fetch(JSON_URL);
                allMaps = await res.json();
            } catch (e) {
                document.getElementById('loader-wrap').innerHTML =
                    '<p style="color:var(--text-muted);text-align:center;padding:40px">Failed to load maps. Please try again.</p>';
                return;
            }

            document.getElementById('loader-wrap').style.display = 'none';
            renderCards(allMaps);
            handleHash();

            const search = document.getElementById('search');
            search.addEventListener('input', () => renderCards(filterMaps(search.value)));
        }

        init();
        lucide.createIcons();
    </script>
</body>

</html>
