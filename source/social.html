<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social – Coming Soon</title>
    <link rel="icon" type="image/png" href="assets/icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --mod-green: #1bd96a;
            --mod-bg: #0e1217;
            --mod-card-bg: #161b22;
            --mod-card-border: #30363d;
            --text-main: #ffffff;
            --text-muted: #a4b1cd;
            --font-family: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            background-color: var(--mod-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* radial glow background */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 50% 50%, rgba(27, 217, 106, 0.07) 0%, transparent 65%),
                linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 100% 100%, 50px 50px, 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .page-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 480px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            white-space: nowrap;
        }

        h1 {
            font-size: clamp(2.4rem, 8vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -2px;
            color: var(--mod-green);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            padding: 10px 20px;
            border: 1px solid var(--mod-card-border);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .back-link:hover {
            border-color: var(--mod-green);
            color: var(--mod-green);
            background: rgba(27, 217, 106, 0.06);
        }

        .back-link svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }


    </style>
</head>

<body>


    <div class="page-content">
        <h1>Coming Soon</h1>

        <a href="index.html" class="back-link">
            <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            Back to Hub
        </a>
    </div>
</body>

</html>
