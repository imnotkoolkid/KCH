    <style>

        .asset-bar {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            margin-bottom: 6px;
            gap: 12px;
        }
        .asset-bar:hover        { border-color: rgba(27,217,106,0.35); background: #1a2030; }
        .asset-bar.bar-open     { border-color: rgba(27,217,106,0.5); border-bottom-left-radius: 0; border-bottom-right-radius: 0; margin-bottom: 0; }

        .asset-bar-info   { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }

        .asset-bar-icon {
            width: 36px; height: 36px; border-radius: 8px;
            background: rgba(27,217,106,0.1); border: 1px solid rgba(27,217,106,0.2);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; color: var(--green);
        }
        .asset-bar-icon svg { width: 18px; height: 18px; }

        .asset-bar-text { min-width: 0; }
        .asset-bar-name  { font-weight: 700; font-size: .95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
        .asset-bar-owner { font-size: .8rem; color: var(--text-muted); margin-top: 2px; }
        .asset-bar-owner a { color: var(--green); text-decoration: none; }
        .asset-bar-owner a:hover { text-decoration: underline; }

        .asset-bar-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

        /* chevron rotate when open */
        .chevron-btn.open svg { transform: rotate(180deg); }

        .asset-dropdown {
            background: #111827;
            border: 1px solid rgba(27, 217, 106, 0.3);
            border-top: none;
            border-radius: 0 0 10px 10px;
            overflow-y: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height .35s ease, opacity .3s ease;
            margin-bottom: 6px;
        }
        .asset-dropdown.open { 
            max-height: 450px; 
            opacity: 1; 
            overflow-y: auto; 
            scrollbar-width: thin;
            scrollbar-color: var(--green) transparent;
        }
        .asset-dropdown::-webkit-scrollbar { width: 5px; }
        .asset-dropdown::-webkit-scrollbar-thumb { background: var(--green); border-radius: 10px; }

        .dropdown-inner { padding: 18px 20px; display: flex; gap: 20px; }
        .dropdown-desc  { flex: 1; font-size: .88rem; color: var(--text-muted); line-height: 1.65; }

        .dropdown-preview-img {
            width: 160px; flex-shrink: 0; border-radius: 8px;
            object-fit: cover; border: 1px solid var(--border);
            cursor: pointer; transition: opacity .2s, border-color .2s;
            align-self: flex-start;
        }
        .dropdown-preview-img:hover { opacity: .85; border-color: rgba(27,217,106,0.4); }

        /* Sound tracks */
        .sound-tracks { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .track-row {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 8px;
            background: var(--card-bg); border: 1px solid var(--border);
        }
        .track-name  { font-size: .85rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
        .track-progress {
            width: 120px; height: 4px; border-radius: 2px;
            background: var(--border); cursor: pointer;
            position: relative; flex-shrink: 0;
        }
        .track-progress-fill { height: 100%; background: var(--green); border-radius: 2px; width: 0%; pointer-events: none; }
        .track-time { font-size: .75rem; color: var(--text-muted); white-space: nowrap; min-width: 36px; text-align: right; }

        .card.asset-card .card-img {
            object-fit: contain;
            padding: 12px;
            background: #0d1117;
        }

        .card-img-loader {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            z-index: 2;
        }
        .section-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 14px; padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .section-header svg { width: 20px; height: 20px; color: var(--green); }
        .section-header h2  { font-size: 1.1rem; font-weight: 800; color: var(--text); }

        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--text-muted);
            display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%;
        }
        .empty-state svg { width: 48px; height: 48px; color: var(--green); opacity: .4; }
        .empty-state h3  { font-size: 1.3rem; font-weight: 700; color: var(--text); }
        .empty-state p   { font-size: .95rem; max-width: 380px; line-height: 1.6; }

        @media (max-width: 768px) {
            .dropdown-inner { flex-direction: column; }
            .dropdown-preview-img { width: 100%; }
            .asset-bar { flex-wrap: wrap; }
            .track-progress { width: 70px; }
        }
    </style>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const DATA_URLS = {
    scripts:   'https://raw.githubusercontent.com/imnotkoolkid/KCH/refs/heads/main/data/script.json',
    sounds:    'https://raw.githubusercontent.com/imnotkoolkid/KCH/refs/heads/main/data/sounds.json',
    killIcons: 'https://raw.githubusercontent.com/imnotkoolkid/KCH/refs/heads/main/data/kill_icons.json',
    skyboxes:  'https://raw.githubusercontent.com/imnotkoolkid/KCH/refs/heads/main/data/skyboxes.json',
};
const cache      = {};
const LIKED_KEY  = 'kch_liked_assets';

const getLiked   = () => { try { return JSON.parse(localStorage.getItem(LIKED_KEY) || '[]'); } catch { return []; } };
const saveLiked  = a  => localStorage.setItem(LIKED_KEY, JSON.stringify([...new Set(a)]));
const isLiked    = id => getLiked().includes(id);
function toggleLiked(id) {
    let a = getLiked();
    const was = a.includes(id);
    saveLiked(was ? a.filter(x => x !== id) : [...a, id]);
    return !was;
}

function showToast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `<i data-lucide="check-circle"></i><span>${msg}</span>`;
    document.getElementById('toast-container').appendChild(el);
    lucide.createIcons({ nodes: [el] });
    setTimeout(() => el.remove(), 2200);
}

async function fetchData(type) {
    if (cache[type]) return cache[type];
    try {
        const r = await fetch(DATA_URLS[type]);
        if (!r.ok) throw 0;
        const j = await r.json();
        cache[type] = j[type] || j;
        return cache[type];
    } catch { return null; }
}

async function dlFile(url, name) {
    if (!url) return;
    try {
        const resp = await fetch(url, { mode: 'cors' });
        if (!resp.ok) throw 0;
        const b = await resp.blob();
        const a = Object.assign(document.createElement('a'), {
            href: URL.createObjectURL(b),
            download: name,
            style: 'display:none'
        });
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 150);
    } catch {
        // CORS blocked — open in new tab so user can manually save
        window.open(url, '_blank', 'noopener,noreferrer');
        showToast('Right-click the image → Save as');
    }
}
async function dlZip(files, name, isAudio = false) {
    if (!files?.length) return;
    showToast('Preparing zip...');
    try {
        const zip = new JSZip();
        const folder = zip.folder(name);
        const promises = files.map(async (f) => {
            const url = typeof f === 'string' ? f : f.url;
            const r = await fetch(url);
            const b = await r.blob();
            let fileName = '';
            if (typeof f === 'object' && f.name) {
                fileName = f.name + (isAudio ? '.mp3' : '.webp');
            } else {
                const ext = url.split('.').pop().split(/[#?]/)[0] || (isAudio ? 'mp3' : 'webp');
                fileName = `file_${Math.random().toString(36).slice(2)}.${ext}`;
            }
            folder.file(fileName, b);
        });
        await Promise.all(promises);
        const blob = await zip.generateAsync({ type: 'blob' });
        const a = Object.assign(document.createElement('a'), { 
            href: URL.createObjectURL(blob), 
            download: name + '.zip',
            style: 'display:none'
        });
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 150);
        showToast('Zip downloaded!');
    } catch { showToast('Zip failed'); }
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
const tabLoaded = {};
const loaders   = { scripts: loadScripts, skyboxes: loadSkyboxes, killicons: loadKillIcons, sounds: loadSounds, liked: loadLiked };

function switchTab(id, btn) {
    document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    // Find button if not provided (for hash handling)
    if (!btn) {
        btn = Array.from(document.querySelectorAll('.tab-item')).find(b => 
            b.getAttribute('onclick').includes(`'${id}'`)
        );
    }
    
    if (btn) btn.classList.add('active');
    document.getElementById('tab-' + id).classList.add('active');
    if (!tabLoaded[id]) { tabLoaded[id] = true; loaders[id]?.(); }
    
    // Update hash
    const hashMap = { scripts: '#scripts', skyboxes: '#skyboxes', killicons: '#kill-icons', sounds: '#sounds', liked: '#liked' };
    if (hashMap[id] && window.location.hash !== hashMap[id]) {
        history.pushState(null, '', hashMap[id]);
    }
}

// ─── Hash Handling ────────────────────────────────────────────────────────────
function handleHash() {
    const hash = window.location.hash;
    if (!hash) return;
    
    const hashToId = {
        '#scripts':    'scripts',
        '#skyboxes':   'skyboxes',
        '#kill-icons': 'killicons',
        '#sounds':     'sounds',
        '#liked':      'liked'
    };
    
    const id = hashToId[hash];
    if (id) {
        switchTab(id);
    } else if (hash && hash.length > 1) {
        window.location.href = '404.html';
    }
}

window.addEventListener('hashchange', handleHash);
window.addEventListener('DOMContentLoaded', () => {
    // Check hash on load
    if (window.location.hash) {
        handleHash();
    } else {
        // Default to scripts if no hash
        tabLoaded['scripts'] = true;
        loadScripts();
    }
});

// ─── Filter ───────────────────────────────────────────────────────────────────
function filterBars(listId, q) {
    const lq = q.toLowerCase();
    let n = document.getElementById(listId).firstChild;
    while (n) {
        if (n.classList?.contains('asset-bar')) {
            const show = (n.dataset.name || '').toLowerCase().includes(lq);
            n.style.display = show ? '' : 'none';
            const dd = n.nextSibling;
            if (dd?.classList?.contains('asset-dropdown')) dd.style.display = show ? '' : 'none';
        }
        n = n.nextSibling;
    }
}

function filterCards(gridId, q) {
    const lq = q.toLowerCase();
    document.querySelectorAll(`#${gridId} > .card`).forEach(c => {
        c.style.display = (c.dataset.name || '').toLowerCase().includes(lq) ? '' : 'none';
    });
}

function closeOtherBars(thisBar) {
    document.querySelectorAll('.asset-bar.bar-open').forEach(b => {
        if (b === thisBar) return;
        b.classList.remove('bar-open');
        const dd = b.nextElementSibling;
        if (dd?.classList.contains('asset-dropdown')) dd.classList.remove('open');
        b.querySelector('.chevron-btn')?.classList.remove('open');
    });
}

async function loadScripts() {
    const list = document.getElementById('scripts-list');
    list.innerHTML = loaderHTML();
    const data = await fetchData('scripts');
    list.innerHTML = '';
    if (!data?.length) { list.innerHTML = emptyHTML(); return; }
    data.forEach(item => renderBar(list, item, 'script'));
}

// ─── Sounds ───────────────────────────────────────────────────────────────────
async function loadSounds() {
    const list = document.getElementById('sounds-list');
    list.innerHTML = loaderHTML();
    const data = await fetchData('sounds');
    list.innerHTML = '';
    if (!data?.length) { list.innerHTML = emptyHTML(); return; }
    data.forEach(item => renderSoundBar(list, item));
}

// ─── Kill Icons ───────────────────────────────────────────────────────────────
async function loadKillIcons() {
    const grid = document.getElementById('killicons-grid');
    grid.innerHTML = gridLoaderHTML();
    const data = await fetchData('killIcons');
    grid.innerHTML = '';
    if (!data?.length) { grid.innerHTML = gridEmptyHTML(); return; }
    data.forEach(item => renderCard(grid, item, 'killIcon'));
}

// ─── Skyboxes ─────────────────────────────────────────────────────────────────
async function loadSkyboxes() {
    const grid = document.getElementById('skyboxes-grid');
    grid.innerHTML = gridLoaderHTML();
    const data = await fetchData('skyboxes');
    grid.innerHTML = '';
    if (!data?.length) { grid.innerHTML = gridEmptyHTML(); return; }
    data.forEach(item => {
        const thumb = item.isPack
            ? (item.images?.find(x => x.name === 'front')?.url || item.images?.[0]?.url)
            : item.url;
        renderCard(grid, { ...item, _thumb: thumb }, 'skybox', item);
    });
}

// ─── Render script bar ────────────────────────────────────────────────────────
function renderBar(container, item, type) {
    const likeId = type + ':' + item.name;
    const liked  = isLiked(likeId);

    const bar = document.createElement('div');
    bar.className    = 'asset-bar';
    bar.dataset.name = item.name;
    bar.innerHTML = `
        <div class="asset-bar-info">
            <div class="asset-bar-icon"><i data-lucide="file-code-2"></i></div>
            <div class="asset-bar-text">
                <div class="asset-bar-name">${esc(item.name)}</div>
                <div class="asset-bar-owner">by <a href="${item.discord||'#'}" target="_blank">${esc(item.owner)}</a></div>
            </div>
        </div>
        <div class="asset-bar-actions">
            <button class="btn-icon" data-action="dl"   title="Download"><i data-lucide="download"></i></button>
            <button class="btn-icon ${liked?'liked':''}" data-action="like" title="Like"><i data-lucide="heart"></i></button>
            <button class="btn-icon" data-action="copy" title="Copy URL"><i data-lucide="link"></i></button>
            <button class="btn-icon chevron-btn" data-action="toggle" title="Details"><i data-lucide="chevron-down"></i></button>
        </div>`;

    const dd = document.createElement('div');
    dd.className = 'asset-dropdown';
    dd.innerHTML = `<div class="dropdown-inner">
        <div class="dropdown-desc">${esc(item.description || 'No description.')}</div>
        ${item.previewImage ? `<img class="dropdown-preview-img" src="${item.previewImage}" alt="">` : ''}
    </div>`;

    // toggle
    const doToggle = () => {
        closeOtherBars(bar);
        const open = !dd.classList.contains('open');
        bar.classList.toggle('bar-open', open);
        dd.classList.toggle('open', open);
        bar.querySelector('.chevron-btn').classList.toggle('open', open);
    };
    bar.addEventListener('click', doToggle);
    bar.querySelector('[data-action="toggle"]').addEventListener('click', e => { e.stopPropagation(); doToggle(); });

    // download
    bar.querySelector('[data-action="dl"]').addEventListener('click', e => {
        e.stopPropagation();
        dlFile(item.url, item.name + '.js');
        showToast('Downloading ' + item.name);
    });

    // like
    bar.querySelector('[data-action="like"]').addEventListener('click', e => {
        e.stopPropagation();
        const now = toggleLiked(likeId);
        e.currentTarget.classList.toggle('liked', now);
        showToast(now ? 'Added to Liked' : 'Removed from Liked');
    });

    // copy
    bar.querySelector('[data-action="copy"]').addEventListener('click', e => {
        e.stopPropagation();
        navigator.clipboard.writeText(item.url).then(() => showToast('URL copied!')).catch(() => showToast('Copy failed'));
    });

    dd.querySelector('.dropdown-preview-img')?.addEventListener('click', e => {
        e.stopPropagation();
        openPreview({
            name: item.name, owner: item.owner, discord: item.discord,
            images: [item.previewImage], type: 'script-preview',
            downloadUrl: null, likeId
        });
    });

    container.appendChild(bar);
    container.appendChild(dd);
    lucide.createIcons({ nodes: [bar] });
}

// ─── Render sound bar ─────────────────────────────────────────────────────────
function renderSoundBar(container, item) {
    const likeId = 'sound:' + item.name;
    const liked  = isLiked(likeId);
    const tracks = item.audioFiles || [];

    const bar = document.createElement('div');
    bar.className    = 'asset-bar';
    bar.dataset.name = item.name;
    bar.innerHTML = `
        <div class="asset-bar-info">
            <div class="asset-bar-icon"><i data-lucide="music"></i></div>
            <div class="asset-bar-text">
                <div class="asset-bar-name">${esc(item.name)}</div>
                <div class="asset-bar-owner">by <a href="${item.discord||'#'}" target="_blank">${esc(item.owner)}</a></div>
            </div>
        </div>
        <div class="asset-bar-actions">
            <button class="btn-icon" data-action="dlpack" title="Download Pack"><i data-lucide="download"></i></button>
            <button class="btn-icon ${liked?'liked':''}" data-action="like" title="Like"><i data-lucide="heart"></i></button>
            <button class="btn-icon chevron-btn" data-action="toggle" title="Tracks"><i data-lucide="chevron-down"></i></button>
        </div>`;

    let tracksHTML = '<div class="dropdown-inner"><div class="sound-tracks">';
    tracks.forEach((f, i) => {
        tracksHTML += `<div class="track-row" data-ti="${i}">
            <button class="btn-icon play-btn"><i data-lucide="play"></i></button>
            <span class="track-name">${esc(f.name)}</span>
            <div class="track-progress"><div class="track-progress-fill"></div></div>
            <span class="track-time">0:00</span>
            <button class="btn-icon track-dl" data-url="${f.url}" data-fn="${esc(f.name)}.mp3"><i data-lucide="download"></i></button>
        </div>`;
    });
    tracksHTML += '</div></div>';

    const dd = document.createElement('div');
    dd.className = 'asset-dropdown';
    dd.innerHTML  = tracksHTML;

    const audios = tracks.map(f => new Audio(f.url));

    const doToggle = () => {
        closeOtherBars(bar);
        const open = !dd.classList.contains('open');
        bar.classList.toggle('bar-open', open);
        dd.classList.toggle('open', open);
        bar.querySelector('.chevron-btn').classList.toggle('open', open);
    };
    bar.addEventListener('click', doToggle);
    bar.querySelector('[data-action="toggle"]').addEventListener('click', e => { e.stopPropagation(); doToggle(); });

    bar.querySelector('[data-action="dlpack"]').addEventListener('click', e => {
        e.stopPropagation();
        dlZip(tracks, item.name, true);
    });

    bar.querySelector('[data-action="like"]').addEventListener('click', e => {
        e.stopPropagation();
        const now = toggleLiked(likeId);
        e.currentTarget.classList.toggle('liked', now);
        showToast(now ? 'Added to Liked' : 'Removed from Liked');
    });

    container.appendChild(bar);
    container.appendChild(dd);
    lucide.createIcons({ nodes: [bar, dd] });

    // wire track players
    dd.querySelectorAll('.track-row').forEach((row, i) => {
        const audio   = audios[i];
        const playBtn = row.querySelector('.play-btn');
        const fill    = row.querySelector('.track-progress-fill');
        const timeEl  = row.querySelector('.track-time');
        const prog    = row.querySelector('.track-progress');
        const dlBtn   = row.querySelector('.track-dl');

        audio.addEventListener('timeupdate', () => {
            fill.style.width = audio.duration ? (audio.currentTime / audio.duration * 100) + '%' : '0%';
            timeEl.textContent = fmtTime(audio.currentTime);
        });
        audio.addEventListener('ended', () => { fill.style.width='0%'; timeEl.textContent='0:00'; setIcon(playBtn,'play'); });

        playBtn.addEventListener('click', e => {
            e.stopPropagation();
            if (audio.paused) {
                audios.forEach((a,j) => { a.pause(); a.currentTime=0; setIcon(dd.querySelectorAll('.play-btn')[j],'play'); });
                audio.play();
                setIcon(playBtn, 'pause');
            } else {
                audio.pause();
                setIcon(playBtn, 'play');
            }
        });

        prog.addEventListener('click', e => {
            e.stopPropagation();
            if (audio.duration) { const r=prog.getBoundingClientRect(); audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration; }
        });

        dlBtn.addEventListener('click', e => {
            e.stopPropagation();
            dlFile(dlBtn.dataset.url, dlBtn.dataset.fn);
            showToast('Downloading ' + tracks[i].name);
        });
    });
}

function setIcon(btn, name) {
    btn.innerHTML = '';
    const i = document.createElement('i');
    i.setAttribute('data-lucide', name);
    btn.appendChild(i);
    lucide.createIcons({ nodes: [btn] });
}

function fmtTime(s) {
    const m=Math.floor(s/60), sec=Math.floor(s%60);
    return m+':'+(sec<10?'0':'')+sec;
}

function renderCard(container, item, type, rawItem) {
    const itemId = item.id || item.name;
    const likeId = type + ':' + itemId;
    const liked  = isLiked(likeId);
    const thumb  = item._thumb || item.url || '';

    const card = document.createElement('div');
    card.className    = 'card asset-card';
    card.dataset.name = item.name;
    card.innerHTML = `
        <div class="card-img-wrapper">
            <img class="card-img" src="${thumb}" alt="${esc(item.name)}">
            <div class="card-img-loader"><div class="loader"></div></div>
        </div>
        <div class="card-body">
            <div class="card-title">${esc(item.name)}</div>
            <div class="card-owner">by <a href="${item.discord||'#'}" target="_blank" style="color:var(--green)">${esc(item.owner)}</a></div>
            <div class="card-actions">
                <button class="btn-icon" data-action="dl"   title="Download"><i data-lucide="download"></i></button>
                <button class="btn-icon" data-action="copy" title="Copy URL"><i data-lucide="link"></i></button>
                <button class="btn-icon ${liked?'liked':''}" data-action="like" title="Like"><i data-lucide="heart"></i></button>
            </div>
        </div>`;

    const img    = card.querySelector('.card-img');
    const ldrEl  = card.querySelector('.card-img-loader');
    img.onload   = () => ldrEl.style.display = 'none';
    img.onerror  = () => ldrEl.style.display = 'none';

    card.addEventListener('click', e => {
        if (e.target.closest('.btn-icon') || e.target.closest('a')) return;
        let images, labels;
        if (rawItem?.isPack && rawItem.images?.length) {
            images = rawItem.images.map(x => x.url);
            labels = rawItem.images.map(x => x.name);
        } else {
            images = [item.url]; labels = null;
        }
        openPreview({ name: item.name, owner: item.owner, discord: item.discord, images, labels, type, downloadUrl: item.url, likeId });
    });

    card.querySelector('[data-action="dl"]').addEventListener('click', e => {
        e.stopPropagation();
        if (rawItem?.isPack && rawItem.images?.length) {
            dlZip(rawItem.images, item.name);
        } else {
            dlFile(thumb, itemId + '.webp');
            showToast('Downloading ' + item.name);
        }
    });
    card.querySelector('[data-action="copy"]').addEventListener('click', e => {
        e.stopPropagation();
        if (rawItem?.isPack && rawItem.images?.length) {
            const text = rawItem.images.map(x => `${x.name}: ${x.url}`).join('\n');
            navigator.clipboard.writeText(text).then(() => showToast('All URLs copied!')).catch(() => showToast('Copy failed'));
        } else {
            navigator.clipboard.writeText(item.url || thumb).then(() => showToast('URL copied!')).catch(() => showToast('Copy failed'));
        }
    });
    card.querySelector('[data-action="like"]').addEventListener('click', e => {
        e.stopPropagation();
        const now = toggleLiked(likeId);
        e.currentTarget.classList.toggle('liked', now);
        showToast(now ? 'Added to Liked' : 'Removed from Liked');
    });

    container.appendChild(card);
    lucide.createIcons({ nodes: [card] });
}

// ─── Liked tab ────────────────────────────────────────────────────────────────
async function loadLiked() {
    const wrap = document.getElementById('liked-content');
    wrap.innerHTML = loaderHTML();
    const liked = getLiked();
    if (!liked.length) { wrap.innerHTML = ''; renderEmpty(wrap); return; }

    const [scripts, sounds, killIcons, skyboxes] = await Promise.all([
        fetchData('scripts'), fetchData('sounds'), fetchData('killIcons'), fetchData('skyboxes')
    ]);
    const ls  = (scripts   ||[]).filter(i => liked.includes('script:'   + i.name));
    const lso = (sounds    ||[]).filter(i => liked.includes('sound:'    + i.name));
    const lk  = (killIcons ||[]).filter(i => liked.includes('killIcon:' + (i.id||i.name)));
    const lsb = (skyboxes  ||[]).filter(i => liked.includes('skybox:'   + (i.id||i.name)));

    if (!ls.length && !lso.length && !lk.length && !lsb.length) { wrap.innerHTML = ''; renderEmpty(wrap); return; }

    wrap.innerHTML = '';

    if (ls.length) {
        wrap.appendChild(miniHeader('Scripts', 'file-code-2'));
        const d = document.createElement('div'); d.style.marginBottom = '28px';
        wrap.appendChild(d); ls.forEach(i => renderBar(d, i, 'script'));
    }
    if (lso.length) {
        wrap.appendChild(miniHeader('Sounds', 'music'));
        const d = document.createElement('div'); d.style.marginBottom = '28px';
        wrap.appendChild(d); lso.forEach(i => renderSoundBar(d, i));
    }
    if (lk.length) {
        wrap.appendChild(miniHeader('Kill Icons', 'crosshair'));
        const g = document.createElement('div');
        g.className = 'all-grid'; g.style.marginBottom = '28px';
        wrap.appendChild(g); lk.forEach(i => renderCard(g, i, 'killIcon'));
    }
    if (lsb.length) {
        wrap.appendChild(miniHeader('Skyboxes', 'image'));
        const g = document.createElement('div');
        g.className = 'all-grid'; g.style.marginBottom = '28px';
        wrap.appendChild(g);
        lsb.forEach(i => {
            const thumb = i.isPack ? (i.images?.find(x=>x.name==='front')?.url||i.images?.[0]?.url) : i.url;
            renderCard(g, {...i, _thumb: thumb}, 'skybox', i);
        });
    }
}

function miniHeader(label, icon) {
    const el = document.createElement('div');
    el.className = 'section-header'; el.style.marginBottom = '14px';
    el.innerHTML = `<h2>${label}</h2>`;
    return el;
}

function renderEmpty(parent) {
    const el = document.createElement('div');
    el.className = 'empty-state';
    el.innerHTML = `<i data-lucide="heart"></i><h3>Nothing liked yet</h3><p>Like scripts, skyboxes, kill icons and sounds to find them here.</p>`;
    parent.appendChild(el);
    lucide.createIcons({ nodes: [el] });
}

// ─── Preview Modal ────────────────────────────────────────────────────────────
let _pv = { images: [], labels: null, idx: 0, likeId: '', downloadUrl: '', type: '' };

// zoom / pan
let zoom = 1, txX = 0, txY = 0, dragging = false, sX, sY;
const MAX_Z = 4, MIN_Z = 0.5;

function openPreview({ name, owner, discord, images, labels, type, downloadUrl, likeId }) {
    _pv = { images, labels, idx: 0, likeId, downloadUrl, type };

    // title + owner
    document.getElementById('preview-title').textContent = name;
    const ownerEl = document.getElementById('preview-owner');
    ownerEl.innerHTML = (owner && discord && discord !== '#')
        ? `by <a href="${discord}" target="_blank">${esc(owner)}</a>`
        : owner ? 'by ' + esc(owner) : '';

    // badge
    const badge = document.getElementById('preview-badge');
    const badgeMap = { killIcon:['Kill Icon','badge-free'], skybox:['Skybox','badge-free'], script:['Script','badge-free'] };
    const [bt, bc] = badgeMap[type] || ['',''];
    badge.textContent = bt; badge.className = 'preview-badge ' + bc;

    document.getElementById('preview-tags').innerHTML = '';

    // actions
    buildActions(name, likeId, downloadUrl, type);

    buildToggles(images, labels);

    // image
    resetZoom();
    loadImg(images[0]);

    document.getElementById('preview-overlay').classList.add('visible');
}

function buildActions(name, likeId, downloadUrl, type) {
    const el = document.getElementById('preview-actions');
    el.innerHTML = '';

    if (type === 'script-preview') { return; }

    // Download
    const isPack = _pv.images.length > 1;
    const dl = mkPBtn('download', isPack ? 'Download Pack' : 'Download', true);
dl.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    if (isPack) {
        dlZip(_pv.images.map((u,i)=>({url:u, name:_pv.labels?.[u]||_pv.labels?.[i]||`view_${i+1}`})), name);
    } else {
        const url = _pv.images[0] || downloadUrl;
        dlFile(url, name + (type === 'script' ? '.js' : '.webp'));
        showToast('Downloading ' + name);
    }
    return false;
});
    el.appendChild(dl);

    // Copy URL
    const cp = mkPBtn('link', 'Copy URL');
    cp.addEventListener('click', () => {
        const url = _pv.images[_pv.idx] || downloadUrl;
        const lbl = _pv.labels ? _pv.labels[_pv.idx] : null;
        navigator.clipboard.writeText(url).then(() => {
            showToast(lbl ? `URL copied for ${lbl}` : 'URL copied!');
        }).catch(() => showToast('Copy failed'));
    });
    el.appendChild(cp);

    lucide.createIcons({ nodes: [el] });
}


function mkPBtn(icon, label, primary = false) {
    const b = document.createElement('button');
    b.className = 'preview-btn' + (primary ? ' primary' : '');
    b.innerHTML = `<i data-lucide="${icon}"></i><span>${label}</span>`;
    return b;
}

function buildToggles(images, labels) {
    const wrap = document.getElementById('preview-img-toggles');
    wrap.innerHTML = '';
    if (images.length <= 1) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'flex';
    images.forEach((url, i) => {
        const btn = document.createElement('button');
        btn.className = 'img-toggle-btn' + (i === 0 ? ' active' : '');
        const lbl = labels?.[i] || ('View ' + (i + 1));
        btn.innerHTML = `${esc(lbl)}`;
        btn.addEventListener('click', () => {
            _pv.idx = i;
            wrap.querySelectorAll('.img-toggle-btn').forEach((b,j) => b.classList.toggle('active', j===i));
            resetZoom();
            loadImg(url);
        });
        wrap.appendChild(btn);
    });
}

function loadImg(url) {
    const img    = document.getElementById('preview-img');
    const loader = document.getElementById('preview-loader');
    loader.style.display = '';
    img.style.opacity    = '0';
    img.src = '';
    img.src = url;
    img.onload  = () => { img.style.opacity = '1'; loader.style.display = 'none'; };
    img.onerror = () => loader.style.display = 'none';
}

// zoom helpers
function applyZoom() {
    const img = document.getElementById('preview-img');
    img.style.transform = `translate(calc(-50% + ${txX}px), calc(-50% + ${txY}px)) scale(${zoom})`;
    const zi  = document.getElementById('zoom-indicator');
    const pct = Math.round(zoom * 100);
    zi.style.display = (pct === 100) ? 'none' : '';
    zi.textContent = pct + '%';
}

function resetZoom() { zoom=1; txX=0; txY=0; applyZoom(); }

function closeModal() {
    document.getElementById('preview-overlay').classList.remove('visible');
    resetZoom();
}

function handleOverlayClick(e) {
    if (e.target === document.getElementById('preview-overlay')) closeModal();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();

    const imgSec = document.querySelector('.preview-img-section');
    imgSec.addEventListener('wheel', e => {
        if (!document.getElementById('preview-overlay').classList.contains('visible')) return;
        e.preventDefault();
        zoom = Math.max(MIN_Z, Math.min(MAX_Z, zoom + (e.deltaY < 0 ? 0.1 : -0.1)));
        if (zoom <= 1) { txX=0; txY=0; }
        applyZoom();
    }, { passive: false });

    // drag to pan
    imgSec.addEventListener('mousedown', e => {
        if (zoom <= 1) return;
        dragging=true; sX=e.clientX-txX; sY=e.clientY-txY;
        imgSec.style.cursor='grabbing';
    });
    document.addEventListener('mousemove', e => {
        if (!dragging) return;
        txX=e.clientX-sX; txY=e.clientY-sY; applyZoom();
    });
    document.addEventListener('mouseup', () => { dragging=false; imgSec.style.cursor=''; });
('touchstart', e => {
        if (zoom <= 1 || e.touches.length!==1) return;
        dragging=true; sX=e.touches[0].clientX-txX; sY=e.touches[0].clientY-txY;
    });
    document.addEventListener('touchmove', e => {
        if (!dragging) return;
        txX=e.touches[0].clientX-sX; txY=e.touches[0].clientY-sY; applyZoom();
    });
    document.addEventListener('touchend', () => { dragging=false; });

    tabLoaded['scripts'] = true;
    loadScripts();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─── HTML helpers ─────────────────────────────────────────────────────────────
const loaderHTML     = () => `<div class="empty-state"><div class="loader"></div></div>`;
const emptyHTML      = () => `<div class="empty-state"><p>Nothing found.</p></div>`;
const gridLoaderHTML = () => `<div class="empty-state" style="grid-column:1/-1"><div class="loader"></div></div>`;
const gridEmptyHTML  = () => `<div class="empty-state" style="grid-column:1/-1"><p>Nothing found.</p></div>`;

function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
