<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Kirka Community Hub - Assets</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="src/pages.css">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <meta name="description"
        content="Discover and download custom assets for kirka.io — scripts, skyboxes, kill icons, and sound packs.">
    <meta name="keywords"
        content="Kirka assets, Kirka scripts, Kirka skyboxes, Kirka kill icons, Kirka sounds, Kirka Community Hub">

    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://kirkacommunityhub.pages.dev/assets.html">
    <meta property="og:title" content="Kirka Community Hub - Assets">
    <meta property="og:description" content="Discover and download Scripts, Skyboxes, Kill Icons & Sounds for kirka.io">
    <meta property="og:image" content="https://kirkacommunityhub.pages.dev/assets/icon.png">
    <meta property="og:url" content="https://kirkacommunityhub.pages.dev/assets.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Kirka Community Hub">
    <meta name="theme-color" content="#1bd96a">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Kirka Community Hub - Assets">
    <meta name="twitter:description"
        content="Discover and download Scripts, Skyboxes, Kill Icons & Sounds for kirka.io">
    <meta name="twitter:image" content="https://kirkacommunityhub.pages.dev/assets/icon.png">
    <style>
        .asset-bar {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            margin-bottom: 6px;
            gap: 12px;
        }

        .asset-bar:hover {
            border-color: rgba(27, 217, 106, 0.35);
            background: #1a2030;
        }

        .asset-bar.bar-open {
            border-color: rgba(27, 217, 106, 0.5);
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            margin-bottom: 0;
        }

        .asset-bar-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .asset-bar-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(27, 217, 106, 0.1);
            border: 1px solid rgba(27, 217, 106, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--green);
        }

        .asset-bar-icon svg {
            width: 18px;
            height: 18px;
        }

        .asset-bar-text {
            min-width: 0;
        }

        .asset-bar-name {
            font-weight: 700;
            font-size: .95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }

        .asset-bar-owner {
            font-size: .8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .asset-bar-owner a {
            color: var(--green);
            text-decoration: none;
        }

        .asset-bar-owner a:hover {
            text-decoration: underline;
        }

        .asset-bar-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .chevron-btn.open svg {
            transform: rotate(180deg);
        }

        .asset-dropdown {
            background: #111827;
            border: 1px solid rgba(27, 217, 106, 0.3);
            border-top: none;
            border-radius: 0 0 10px 10px;
            overflow-y: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height .35s ease, opacity .3s ease;
            margin-bottom: 6px;
        }

        .asset-dropdown.open {
            max-height: 450px;
            opacity: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--green) transparent;
        }

        .asset-dropdown::-webkit-scrollbar {
            width: 5px;
        }

        .asset-dropdown::-webkit-scrollbar-thumb {
            background: var(--green);
            border-radius: 10px;
        }

        .dropdown-inner {
            padding: 18px 20px;
            display: flex;
            gap: 20px;
        }

        .dropdown-desc {
            flex: 1;
            font-size: .88rem;
            color: var(--text-muted);
            line-height: 1.65;
        }

        .dropdown-preview-img {
            width: 160px;
            flex-shrink: 0;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: opacity .2s, border-color .2s;
            align-self: flex-start;
        }

        .dropdown-preview-img:hover {
            opacity: .85;
            border-color: rgba(27, 217, 106, 0.4);
        }

        /* Sound tracks */
        .sound-tracks {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .track-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 8px;
            background: var(--card-bg);
            border: 1px solid var(--border);
        }

        .track-name {
            font-size: .85rem;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
        }

        .track-progress {
            width: 120px;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }

        .track-progress-fill {
            height: 100%;
            background: var(--green);
            border-radius: 2px;
            width: 0%;
            pointer-events: none;
        }

        .track-time {
            font-size: .75rem;
            color: var(--text-muted);
            white-space: nowrap;
            min-width: 36px;
            text-align: right;
        }

        .card.asset-card .card-img {
            object-fit: contain;
            padding: 12px;
            background: #0d1117;
        }

        .card-img-loader {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }

        .section-header svg {
            width: 20px;
            height: 20px;
            color: var(--green);
        }

        .section-header h2 {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            color: var(--green);
            opacity: .4;
        }

        .empty-state h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
        }

        .empty-state p {
            font-size: .95rem;
            max-width: 380px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .dropdown-inner {
                flex-direction: column;
            }

            .dropdown-preview-img {
                width: 100%;
            }

            .asset-bar {
                flex-wrap: wrap;
            }

            .track-progress {
                width: 70px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="assets/icon.png" onerror="this.style.display='none'">
                <span>Kirka Community Hub</span>
            </a>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link"><i data-lucide="chevron-left"></i> Back</a>
            </nav>
        </div>
    </header>

    <main>

        <div class="tabs-wrapper">
            <div class="tabs-container">
                <button class="tab-item active" onclick="switchTab('scripts',   this)">Scripts</button>
                <button class="tab-item" onclick="switchTab('skyboxes',  this)">Skyboxes</button>
                <button class="tab-item" onclick="switchTab('killicons', this)">Kill Icons</button>
                <button class="tab-item" onclick="switchTab('sounds',    this)">Sounds</button>
                <button class="tab-item" onclick="switchTab('liked',     this)">Liked</button>
            </div>
        </div>

        <div class="container">


            <div class="tab-content active" id="tab-scripts">
                <div id="scripts-list"></div>
            </div>

            <div class="tab-content" id="tab-skyboxes">
                <div class="all-grid" id="skyboxes-grid"></div>
            </div>


            <div class="tab-content" id="tab-killicons">
                <div class="all-grid" id="killicons-grid"></div>
            </div>


            <div class="tab-content" id="tab-sounds">
                <div id="sounds-list"></div>
            </div>


            <div class="tab-content" id="tab-liked">
                <div id="liked-content"></div>
            </div>

        </div>
    </main>


    <div class="preview-overlay" id="preview-overlay" onclick="handleOverlayClick(event)">
        <div class="preview-modal" id="preview-modal">


            <div class="preview-img-section loader-container">
                <img class="preview-main-img" id="preview-img" src="" alt="" draggable="false">
                <div class="loader" id="preview-loader"></div>

                <div class="preview-img-toggles" id="preview-img-toggles"></div>

                <div class="zoom-indicator" id="zoom-indicator"></div>
            </div>

            <div class="preview-body">
                <div class="preview-header">
                    <div class="preview-title-block">
                        <div class="preview-title" id="preview-title"></div>
                        <div class="preview-owner" id="preview-owner"></div>
                    </div>
                    <span class="preview-badge" id="preview-badge"></span>
                </div>
                <div class="preview-tags" id="preview-tags"></div>
                <div class="preview-actions" id="preview-actions"></div>
            </div>

        </div>
    </div>


    <div class="source-overlay" id="source-overlay" onclick="handleSourceOverlayClick(event)">
        <div class="source-modal" id="source-modal">
            <div class="source-modal-header">
                <div class="source-modal-title" id="source-modal-name">Source</div>
                <div class="source-modal-actions">
                    <button class="source-share-btn" id="source-share-btn" title="Share Source Code"
                        onclick="shareSourceCode()">
                        <i data-lucide="share-2"></i>
                    </button>
                    <button class="source-copy-btn" id="source-copy-btn" title="Copy Code" onclick="copySourceCode()">
                        <span class="copy-icon"></span>
                    </button>
                </div>
            </div>
            <div class="source-code-wrapper" id="source-code-wrapper">
                <div class="source-loading" id="source-loading">
                    <div class="loader" style="width:28px"></div>
                    <span>Loading source…</span>
                </div>
            </div>
        </div>
    </div>


    <div class="toast-container" id="toast-container"></div>


    <footer>
        <div class="container footer-content">
            <div>
                <a href="index.html" class="footer-logo">
                    <img src="assets/icon.png" width="30" onerror="this.style.display='none'">
                    <span>Kirka Community Hub</span>
                </a>
                <p style="color:var(--text-muted);font-size:.9rem;max-width:300px">
                    Not affiliated with Kirka.io.<br>Built by the community, for the community.
                </p>
            </div>
            <div class="footer-links-wrapper">
                <div class="footer-links">
                    <h4>Resources</h4>
                    <ul>
                        <li><a href="https://github.com/imnotkoolkid/kch" target="_blank"
                                rel="noopener noreferrer">github</a></li>
                    </ul>
                </div>
                <div class="footer-links">
                    <h4>Community</h4>
                    <ul>
                        <li><a href="contribution.html">contribution</a></li>
                        <li><a href="submit-content.html">Submit Content</a></li>
                    </ul>
                </div>
                <div class="footer-links">
                    <h4>Legal</h4>
                    <ul>
                        <li><a href="tos.html">Terms Of Service</a></li>
                        <li><a href="report.html">Report</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>

    <script>
        const DATA_URLS = { scripts: 'https://raw.githubusercontent.com/imnotkoolkid/KCH/refs/heads/main/data/script.json', sounds: 'https://raw.githubusercontent.com/imnotkoolkid/KCH/refs/heads/main/data/sounds.json', killIcons: 'https://raw.githubusercontent.com/imnotkoolkid/KCH/refs/heads/main/data/kill_icons.json', skyboxes: 'https://raw.githubusercontent.com/imnotkoolkid/KCH/refs/heads/main/data/skyboxes.json' };
        const cache = {}, LIKED_KEY = 'kch_liked_assets';
        const getLiked = () => { try { return JSON.parse(localStorage.getItem(LIKED_KEY) || '[]'); } catch { return []; } };
        const saveLiked = a => localStorage.setItem(LIKED_KEY, JSON.stringify([...new Set(a)]));
        const isLiked = id => getLiked().includes(id);
        function toggleLiked(id) { let a = getLiked(); const was = a.includes(id); saveLiked(was ? a.filter(x => x !== id) : [...a, id]); return !was; }
        function showToast(msg) {
            const el = document.createElement('div'); el.className = 'toast';
            el.innerHTML = `<i data-lucide="check-circle"></i><span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(el);
            lucide.createIcons({ nodes: [el] }); setTimeout(() => el.remove(), 2200);
        }
        async function fetchData(type) {
            if (cache[type]) return cache[type];
            try { const r = await fetch(DATA_URLS[type]); if (!r.ok) throw 0; const j = await r.json(); return (cache[type] = j[type] || j); } catch { return null; }
        }
        async function dlFile(url, name) {
            if (!url) return;
            try {
                const resp = await fetch(url, { mode: 'cors' }); if (!resp.ok) throw 0;
                const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(await resp.blob()), download: name, style: 'display:none' });
                document.body.appendChild(a); a.click(); setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 150);
            } catch { window.open(url, '_blank', 'noopener,noreferrer'); showToast('Right-click the image → Save as'); }
        }
        async function dlZip(files, name, isAudio = false) {
            if (!files?.length) return; showToast('Preparing zip...');
            try {
                const zip = new JSZip(), folder = zip.folder(name);
                await Promise.all(files.map(async f => {
                    const url = typeof f === 'string' ? f : f.url, ext = url.split('.').pop().split(/[#?]/)[0] || (isAudio ? 'mp3' : 'webp');
                    folder.file(f.name ? f.name + '.' + (isAudio ? 'mp3' : 'webp') : `file_${Math.random().toString(36).slice(2)}.${ext}`, await (await fetch(url)).blob());
                }));
                const a = Object.assign(document.createElement('a'), { href: URL.createObjectURL(await zip.generateAsync({ type: 'blob' })), download: name + '.zip', style: 'display:none' });
                document.body.appendChild(a); a.click(); setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 150);
                showToast('Zip downloaded!');
            } catch { showToast('Zip failed'); }
        }

        const tabLoaded = {};
        const loaderHTML = () => `<div class="empty-state"><div class="loader"></div></div>`, emptyHTML = () => `<div class="empty-state"><p>Nothing found.</p></div>`, gridLoaderHTML = () => `<div class="empty-state" style="grid-column:1/-1"><div class="loader"></div></div>`, gridEmptyHTML = () => `<div class="empty-state" style="grid-column:1/-1"><p>Nothing found.</p></div>`;
        const loadList = async (type, id, renderer, isGrid) => {
            const el = document.getElementById(id); el.innerHTML = isGrid ? gridLoaderHTML() : loaderHTML();
            const data = await fetchData(type); el.innerHTML = '';
            if (!data?.length) return (el.innerHTML = isGrid ? gridEmptyHTML() : emptyHTML());
            data.forEach(i => renderer(el, i));
        };

        const loaders = {
            scripts: () => loadList('scripts', 'scripts-list', (el, i) => renderBar(el, i, 'script')),
            sounds: () => loadList('sounds', 'sounds-list', renderSoundBar),
            killicons: () => loadList('killIcons', 'killicons-grid', (el, i) => renderCard(el, i, 'killIcon'), true),
            skyboxes: () => loadList('skyboxes', 'skyboxes-grid', (el, i) => renderCard(el, { ...i, _thumb: i.isPack ? (i.images?.find(x => x.name === 'front')?.url || i.images?.[0]?.url) : i.url }, 'skybox', i), true),
            liked: () => loadLiked()
        };

        async function switchTab(id, btn, updateHash = true) {
            document.querySelectorAll('.tab-item, .tab-content').forEach(e => e.classList.remove('active'));
            (btn || document.querySelector(`.tab-item[onclick*="'${id}'"]`))?.classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
            if (!tabLoaded[id]) { tabLoaded[id] = true; await loaders[id]?.(); }
            if (updateHash) {
                const h = { scripts: '#scripts', skyboxes: '#skyboxes', killicons: '#kill-icons', sounds: '#sounds', liked: '#liked' }[id];
                if (h && window.location.hash.split('#')[1] !== h.substring(1)) history.pushState(null, '', h);
            }
        }

        async function handleHash() {
            const parts = window.location.hash.split('#').filter(Boolean);
            if (!parts.length) return;
            const id = { scripts: 'scripts', skyboxes: 'skyboxes', 'kill-icons': 'killicons', sounds: 'sounds', liked: 'liked' }[parts[0]];
            if (id) {
                await switchTab(id, null, false);
                if (parts[1]) {
                    const name = decodeURIComponent(parts[1]).replace(/-/g, ' ').toLowerCase();
                    const clickEl = (sel, isCard) => {
                        const el = Array.from(document.querySelectorAll(sel)).find(e => e.dataset.name.toLowerCase() === name);
                        if (el) isCard ? (el.querySelector('.card-img') || el).click() : (!el.classList.contains('bar-open') && el.click(), setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100));
                    };
                    if (id === 'scripts' && parts[1].startsWith('vs:')) {
                        const scr = (await fetchData('scripts') || []).find(i => i.name.toLowerCase() === decodeURIComponent(parts[1].slice(3)).replace(/-/g, ' ').toLowerCase());
                        if (scr) await openSourceViewer(scr.url, scr.name);
                    } else if (['skyboxes', 'killicons'].includes(id)) clickEl(`#${id}-grid .card`, true);
                    else if (['scripts', 'sounds'].includes(id)) clickEl(`#${id}-list .asset-bar`, false);
                    else if (id === 'liked') {
                        const card = Array.from(document.querySelectorAll(`#liked-content .card`)).find(c => c.dataset.name.toLowerCase() === name);
                        if (card) (card.querySelector('.card-img') || card).click(); else clickEl(`#liked-content .asset-bar`, false);
                    }
                } else {
                    closeModal(); closeOtherBars();
                    if (document.getElementById('source-overlay')?.classList.contains('visible')) closeSourceViewer();
                }
            } else if (parts[0]) window.location.href = '404.html';
        }

        window.addEventListener('hashchange', handleHash);
        window.addEventListener('DOMContentLoaded', () => window.location.hash ? handleHash() : (tabLoaded.scripts = true, loaders.scripts()));

        function filterBars(listId, q) {
            const lq = q.toLowerCase();
            for (let n = document.getElementById(listId).firstChild; n; n = n.nextSibling) {
                if (n.classList?.contains('asset-bar')) {
                    const show = (n.dataset.name || '').toLowerCase().includes(lq);
                    n.style.display = show ? '' : 'none';
                    if (n.nextSibling?.classList?.contains('asset-dropdown')) n.nextSibling.style.display = show ? '' : 'none';
                }
            }
        }
        function filterCards(gridId, q) { const lq = q.toLowerCase(); document.querySelectorAll(`#${gridId} > .card`).forEach(c => c.style.display = (c.dataset.name || '').toLowerCase().includes(lq) ? '' : 'none'); }
        function closeOtherBars(b) { document.querySelectorAll('.asset-bar.bar-open').forEach(x => { if (x !== b) { x.classList.remove('bar-open'); x.nextElementSibling?.classList.remove('open'); x.querySelector('.chevron-btn')?.classList.remove('open'); } }); }

        const esc = s => String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
        const formatOwner = (i, card) => i.discord && i.discord !== '#' ? `<a href="${i.discord}" target="_blank"${card ? ' style="color:var(--green)"' : ''}>${esc(i.owner)}</a>` : esc(i.owner);
        const btnAction = (p, a, fn) => p.querySelector(`[data-action="${a}"]`)?.addEventListener('click', e => { e.stopPropagation(); fn(e); });
        const shareAction = (tab, name) => navigator.clipboard.writeText(`${location.origin}${location.pathname}#${tab}#${encodeURIComponent(name.trim().replace(/\s+/g, '-').toLowerCase())}`).then(() => showToast('Link copied!')).catch(() => showToast('Copy failed'));
        const toggleDropdown = (bar, dd, tab, name) => {
            closeOtherBars(bar); const open = !dd.classList.contains('open');
            bar.classList.toggle('bar-open', open); dd.classList.toggle('open', open); bar.querySelector('.chevron-btn').classList.toggle('open', open);
            const h = '#' + (window.location.hash.split('#')[1] || tab);
            history.pushState(null, '', open ? `${h}#${encodeURIComponent(name.trim().replace(/\s+/g, '-').toLowerCase())}` : h);
        };

        function renderBar(container, item, type) {
            const likeId = type + ':' + item.name, liked = isLiked(likeId), bar = document.createElement('div'), dd = document.createElement('div');
            bar.className = 'asset-bar'; bar.dataset.name = item.name;
            bar.innerHTML = `<div class="asset-bar-info"><div class="asset-bar-icon"><i data-lucide="file-code-2"></i></div><div class="asset-bar-text"><div class="asset-bar-name">${esc(item.name)}</div><div class="asset-bar-owner">by ${formatOwner(item)}</div></div></div><div class="asset-bar-actions"><button class="btn-icon" data-action="dl" title="Download"><i data-lucide="download"></i></button><button class="btn-icon" data-action="copy-script" title="Copy Script"><i data-lucide="clipboard"></i></button><button class="btn-icon" data-action="view-source" title="View Source"><i data-lucide="code-2"></i></button><button class="btn-icon" data-action="share" title="Share"><i data-lucide="share-2"></i></button><button class="btn-icon ${liked ? 'liked' : ''}" data-action="like" title="Like"><i data-lucide="heart"></i></button><button class="btn-icon chevron-btn" data-action="toggle" title="Details"><i data-lucide="chevron-down"></i></button></div>`;
            dd.className = 'asset-dropdown'; dd.innerHTML = `<div class="dropdown-inner"><div class="dropdown-desc">${esc(item.description || 'No description.')}</div>${item.previewImage ? `<img class="dropdown-preview-img" src="${item.previewImage}">` : ''}</div>`;

            const doToggle = () => toggleDropdown(bar, dd, 'scripts', item.name);
            bar.addEventListener('click', doToggle); btnAction(bar, 'toggle', doToggle);
            btnAction(bar, 'dl', () => { dlFile(item.url, item.name + '.js'); showToast('Downloading ' + item.name); });
            btnAction(bar, 'like', e => { const now = toggleLiked(likeId); e.currentTarget.classList.toggle('liked', now); showToast(now ? 'Added to Liked' : 'Removed from Liked'); });
            btnAction(bar, 'view-source', () => openSourceViewer(item.url, item.name));
            btnAction(bar, 'copy-script', async () => { try { await navigator.clipboard.writeText(await (await fetch(item.url)).text()); showToast('Script copied!'); } catch { showToast('Copy failed'); } });
            btnAction(bar, 'share', () => shareAction('scripts', item.name));
            dd.querySelector('.dropdown-preview-img')?.addEventListener('click', e => { e.stopPropagation(); openPreview({ name: item.name, owner: item.owner, discord: item.discord, images: [item.previewImage], type: 'script-preview', downloadUrl: null, likeId }); });
            container.append(bar, dd); lucide.createIcons({ nodes: [bar] });
        }

        function renderSoundBar(container, item) {
            const likeId = 'sound:' + item.name, liked = isLiked(likeId), tracks = item.audioFiles || [], bar = document.createElement('div'), dd = document.createElement('div');
            bar.className = 'asset-bar'; bar.dataset.name = item.name;
            bar.innerHTML = `<div class="asset-bar-info"><div class="asset-bar-icon"><i data-lucide="music"></i></div><div class="asset-bar-text"><div class="asset-bar-name">${esc(item.name)}</div><div class="asset-bar-owner">by ${formatOwner(item)}</div></div></div><div class="asset-bar-actions"><button class="btn-icon" data-action="dlpack" title="Download Pack"><i data-lucide="download"></i></button><button class="btn-icon" data-action="share" title="Share"><i data-lucide="share-2"></i></button><button class="btn-icon ${liked ? 'liked' : ''}" data-action="like" title="Like"><i data-lucide="heart"></i></button><button class="btn-icon chevron-btn" data-action="toggle" title="Tracks"><i data-lucide="chevron-down"></i></button></div>`;
            dd.className = 'asset-dropdown'; dd.innerHTML = `<div class="dropdown-inner"><div class="sound-tracks">${tracks.map((f, i) => `<div class="track-row" data-ti="${i}"><button class="btn-icon play-btn"><i data-lucide="play"></i></button><span class="track-name">${esc(f.name)}</span><div class="track-progress"><div class="track-progress-fill"></div></div><span class="track-time">0:00</span><button class="btn-icon track-dl" data-url="${f.url}" data-fn="${esc(f.name)}.mp3"><i data-lucide="download"></i></button></div>`).join('')}</div></div>`;

            const audios = tracks.map(f => new Audio(f.url)), doToggle = () => toggleDropdown(bar, dd, 'sounds', item.name);
            bar.addEventListener('click', doToggle); btnAction(bar, 'toggle', doToggle);
            btnAction(bar, 'dlpack', () => dlZip(tracks, item.name, true));
            btnAction(bar, 'like', e => { const now = toggleLiked(likeId); e.currentTarget.classList.toggle('liked', now); showToast(now ? 'Added to Liked' : 'Removed from Liked'); });
            btnAction(bar, 'share', () => shareAction('sounds', item.name));
            container.append(bar, dd); lucide.createIcons({ nodes: [bar, dd] });

            dd.querySelectorAll('.track-row').forEach((row, i) => {
                const audio = audios[i], pb = row.querySelector('.play-btn'), fill = row.querySelector('.track-progress-fill'), timeEl = row.querySelector('.track-time'), prog = row.querySelector('.track-progress');
                audio.addEventListener('timeupdate', () => { fill.style.width = audio.duration ? (audio.currentTime / audio.duration * 100) + '%' : '0%'; timeEl.textContent = `${Math.floor(audio.currentTime / 60)}:${Math.floor(audio.currentTime % 60).toString().padStart(2, '0')}`; });
                audio.addEventListener('ended', () => { fill.style.width = '0%'; timeEl.textContent = '0:00'; setIcon(pb, 'play'); });
                pb.addEventListener('click', e => { e.stopPropagation(); if (audio.paused) { audios.forEach((a, j) => { a.pause(); a.currentTime = 0; setIcon(dd.querySelectorAll('.play-btn')[j], 'play'); }); audio.play(); setIcon(pb, 'pause'); } else { audio.pause(); setIcon(pb, 'play'); } });
                prog.addEventListener('click', e => { e.stopPropagation(); if (audio.duration) { const r = prog.getBoundingClientRect(); audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration; } });
                row.querySelector('.track-dl').addEventListener('click', e => { e.stopPropagation(); dlFile(e.currentTarget.dataset.url, e.currentTarget.dataset.fn); showToast('Downloading ' + tracks[i].name); });
            });
        }
        function setIcon(btn, name) { btn.innerHTML = `<i data-lucide="${name}"></i>`; lucide.createIcons({ nodes: [btn] }); }

        function renderCard(container, item, type, rawItem) {
            const itemId = item.id || item.name, likeId = type + ':' + itemId, liked = isLiked(likeId), thumb = item._thumb || item.url || '', card = document.createElement('div');
            card.className = 'card asset-card'; card.dataset.name = item.name;
            card.innerHTML = `<div class="card-img-wrapper"><img class="card-img" src="${thumb}"><div class="card-img-loader"><div class="loader"></div></div></div><div class="card-body"><div class="card-title">${esc(item.name)}</div><div class="card-owner">by ${formatOwner(item, true)}</div><div class="card-actions"><button class="btn-icon" data-action="dl" title="Download"><i data-lucide="download"></i></button><button class="btn-icon" data-action="share" title="Share"><i data-lucide="share-2"></i></button><button class="btn-icon ${liked ? 'liked' : ''}" data-action="like" title="Like"><i data-lucide="heart"></i></button></div></div>`;
            const img = card.querySelector('.card-img'), ldr = card.querySelector('.card-img-loader'); img.onload = img.onerror = () => ldr.style.display = 'none';

            card.addEventListener('click', e => {
                if (e.target.closest('.btn-icon') || e.target.closest('a')) return;
                const isPack = rawItem?.isPack && rawItem.images?.length;
                openPreview({ name: item.name, owner: item.owner, discord: item.discord, images: isPack ? rawItem.images.map(x => x.url) : [item.url], labels: isPack ? rawItem.images.map(x => x.name) : null, type, downloadUrl: item.url, likeId });
            });
            btnAction(card, 'dl', () => { if (rawItem?.isPack && rawItem.images?.length) dlZip(rawItem.images, item.name); else { dlFile(thumb, itemId + '.webp'); showToast('Downloading ' + item.name); } });
            btnAction(card, 'share', () => shareAction(type === 'skybox' ? 'skyboxes' : 'kill-icons', item.name));
            btnAction(card, 'like', e => { const now = toggleLiked(likeId); e.currentTarget.classList.toggle('liked', now); showToast(now ? 'Added to Liked' : 'Removed from Liked'); });
            container.appendChild(card); lucide.createIcons({ nodes: [card] });
        }

        async function loadLiked() {
            const wrap = document.getElementById('liked-content'); wrap.innerHTML = loaderHTML();
            const liked = getLiked(); if (!liked.length) return (wrap.innerHTML = `<div class="empty-state"><i data-lucide="heart"></i><h3>Nothing liked yet</h3><p>Like scripts, skyboxes, kill icons and sounds to find them here.</p></div>`, lucide.createIcons({ nodes: [wrap] }));
            const [scripts, sounds, killIcons, skyboxes] = await Promise.all(['scripts', 'sounds', 'killIcons', 'skyboxes'].map(fetchData));
            const ls = (scripts || []).filter(i => liked.includes('script:' + i.name)), lso = (sounds || []).filter(i => liked.includes('sound:' + i.name)), lk = (killIcons || []).filter(i => liked.includes('killIcon:' + (i.id || i.name))), lsb = (skyboxes || []).filter(i => liked.includes('skybox:' + (i.id || i.name)));
            if (!ls.length && !lso.length && !lk.length && !lsb.length) return (wrap.innerHTML = `<div class="empty-state"><i data-lucide="heart"></i><h3>Nothing liked yet</h3><p>Like scripts, skyboxes, kill icons and sounds to find them here.</p></div>`, lucide.createIcons({ nodes: [wrap] }));
            wrap.innerHTML = '';
            const addSec = (label, items, renderFn, isGrid) => {
                if (!items.length) return;
                const h = document.createElement('div'); h.className = 'section-header'; h.style.marginBottom = '14px'; h.innerHTML = `<h2>${label}</h2>`; wrap.appendChild(h);
                const c = document.createElement('div'); if (isGrid) c.className = 'all-grid'; c.style.marginBottom = '28px'; wrap.appendChild(c); items.forEach(i => renderFn(c, i));
            };
            addSec('Scripts', ls, (c, i) => renderBar(c, i, 'script')); addSec('Sounds', lso, renderSoundBar); addSec('Kill Icons', lk, (c, i) => renderCard(c, i, 'killIcon'), true); addSec('Skyboxes', lsb, (c, i) => renderCard(c, { ...i, _thumb: i.isPack ? (i.images?.find(x => x.name === 'front')?.url || i.images?.[0]?.url) : i.url }, 'skybox', i), true);
        }

        let _pv = { images: [], labels: null, idx: 0, likeId: '', downloadUrl: '', type: '' }, zoom = 1, txX = 0, txY = 0, dragging = false, sX, sY;
        const applyZoom = () => { document.getElementById('preview-img').style.transform = `translate(calc(-50% + ${txX}px), calc(-50% + ${txY}px)) scale(${zoom})`; const zi = document.getElementById('zoom-indicator'); zi.style.display = zoom === 1 ? 'none' : ''; zi.textContent = Math.round(zoom * 100) + '%'; };
        const resetZoom = () => { zoom = 1; txX = 0; txY = 0; applyZoom(); };

        function openPreview({ name, owner, discord, images, labels, type, downloadUrl, likeId }) {
            _pv = { images, labels, idx: 0, likeId, downloadUrl, type };
            history.pushState(null, '', `#${window.location.hash.split('#')[1] || 'scripts'}#${encodeURIComponent(name.trim().replace(/\s+/g, '-').toLowerCase())}`);
            document.getElementById('preview-title').textContent = name;
            document.getElementById('preview-owner').innerHTML = owner ? (discord && discord !== '#' ? `by <a href="${discord}" target="_blank">${esc(owner)}</a>` : 'by ' + esc(owner)) : '';
            const badge = document.getElementById('preview-badge'); badge.textContent = { killIcon: 'Kill Icon', skybox: 'Skybox', script: 'Script' }[type] || ''; badge.className = 'preview-badge badge-free';

            const actionsEl = document.getElementById('preview-actions'); actionsEl.innerHTML = '';
            if (type !== 'script-preview') {
                const mkBtn = (icon, label, primary) => { const b = document.createElement('button'); b.className = 'preview-btn' + (primary ? ' primary' : ''); b.innerHTML = `<i data-lucide="${icon}"></i><span>${label}</span>`; return b; };
                const isPack = images.length > 1, dl = mkBtn('download', isPack ? 'Download Pack' : 'Download', true);
                dl.onclick = e => { e.preventDefault(); e.stopPropagation(); isPack ? dlZip(images.map((u, i) => ({ url: u, name: labels?.[i] || `view_${i + 1}` })), name) : (dlFile(images[0] || downloadUrl, name + (type === 'script' ? '.js' : '.webp')), showToast('Downloading ' + name)); return false; };
                const cp = mkBtn('link', 'Copy URL'); cp.onclick = () => navigator.clipboard.writeText(images[_pv.idx] || downloadUrl).then(() => showToast(labels?.[_pv.idx] ? `URL copied for ${labels[_pv.idx]}` : 'URL copied!')).catch(() => showToast('Copy failed'));
                const sh = mkBtn('share-2', 'Share'); sh.onclick = () => navigator.clipboard.writeText(location.href).then(() => showToast('Link copied!')).catch(() => showToast('Copy failed'));
                actionsEl.append(dl, cp, sh); lucide.createIcons({ nodes: [actionsEl] });
            }

            const wrap = document.getElementById('preview-img-toggles'); wrap.innerHTML = ''; wrap.style.display = images.length <= 1 ? 'none' : 'flex';
            if (images.length > 1) {
                images.forEach((url, i) => {
                    const btn = document.createElement('button'); btn.className = 'img-toggle-btn' + (i === 0 ? ' active' : ''); btn.textContent = labels?.[i] || ('View ' + (i + 1));
                    btn.onclick = () => { _pv.idx = i; wrap.querySelectorAll('.img-toggle-btn').forEach((b, j) => b.classList.toggle('active', j === i)); resetZoom(); loadImg(url); };
                    wrap.appendChild(btn);
                });
            }
            resetZoom(); loadImg(images[0]); document.getElementById('preview-overlay').classList.add('visible');
        }

        function loadImg(url) {
            const img = document.getElementById('preview-img'), loader = document.getElementById('preview-loader');
            loader.style.display = ''; img.style.opacity = '0'; img.src = url;
            img.onload = () => { img.style.opacity = '1'; loader.style.display = 'none'; }; img.onerror = () => loader.style.display = 'none';
        }

        function closeModal() {
            document.getElementById('preview-overlay').classList.remove('visible'); resetZoom();
            if (_pv.type !== 'script-preview' && window.location.hash.split('#')[1]) history.pushState(null, '', '#' + window.location.hash.split('#')[1]);
        }
        function handleOverlayClick(e) { if (e.target === document.getElementById('preview-overlay')) closeModal(); }

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            const imgSec = document.querySelector('.preview-img-section');
            imgSec.addEventListener('wheel', e => { if (!document.getElementById('preview-overlay').classList.contains('visible')) return; e.preventDefault(); zoom = Math.max(0.5, Math.min(4, zoom + (e.deltaY < 0 ? 0.1 : -0.1))); if (zoom <= 1) txX = txY = 0; applyZoom(); }, { passive: false });
            const dragStart = (x, y) => { if (zoom <= 1) return; dragging = true; sX = x - txX; sY = y - txY; imgSec.style.cursor = 'grabbing'; };
            const dragMove = (x, y) => { if (!dragging) return; txX = x - sX; txY = y - sY; applyZoom(); };
            imgSec.addEventListener('mousedown', e => dragStart(e.clientX, e.clientY)); document.addEventListener('mousemove', e => dragMove(e.clientX, e.clientY)); document.addEventListener('mouseup', () => { dragging = false; imgSec.style.cursor = ''; });
            imgSec.addEventListener('touchstart', e => { if (e.touches.length === 1) dragStart(e.touches[0].clientX, e.touches[0].clientY); }); document.addEventListener('touchmove', e => { if (e.touches.length === 1) dragMove(e.touches[0].clientX, e.touches[0].clientY); }); document.addEventListener('touchend', () => dragging = false);
        });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('source-overlay')?.classList.contains('visible') ? closeSourceViewer() : closeModal(); });

        let curSourceCode = '';
        const highlightJS = code => code.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m])).replace(/(["'`])(?:(?=(\\?))\2[\s\S])*?\1/g, '§P§$&§E§').replace(/(\/\/.*|\/\*[\s\S]*?\*\/)/g, '§C§$&§E§').replace(/\b(function|const|let|var|return|if|else|for|while|await|async|class|new|true|false|null|undefined)\b/g, '§K§$1§E§').replace(/§P§/g, '<span class="css-property">').replace(/§C§/g, '<span class="css-comment">').replace(/§K§/g, '<span class="css-atrule">').replace(/§E§/g, '</span>');

        async function openSourceViewer(url, title) {
            if (!url) return; curSourceCode = '';
            history.pushState(null, '', `#scripts#vs:${encodeURIComponent(title.trim().replace(/\s+/g, '-').toLowerCase())}`);
            document.getElementById('source-modal-name').textContent = title;
            const wrap = document.getElementById('source-code-wrapper'); wrap.innerHTML = `<div class="source-loading"><div class="loader" style="width:28px"></div><span>Loading source…</span></div>`;
            document.getElementById('source-overlay').classList.add('visible'); document.body.style.overflow = 'hidden'; lucide.createIcons();
            try {
                const res = await fetch(url); if (!res.ok) throw 0; curSourceCode = await res.text();
                wrap.innerHTML = `<div class="source-line-numbers"><div class="line-nums">${curSourceCode.split('\n').map((_, i) => `<div>${i + 1}</div>`).join('')}</div><div class="line-code">${highlightJS(curSourceCode).split('\n').map(l => `<div>${l || '&nbsp;'}</div>`).join('')}</div></div>`;
            } catch { wrap.innerHTML = `<div class="source-loading" style="color:#e27383"><span>Failed to load source code.</span></div>`; }
        }
        function closeSourceViewer() { document.getElementById('source-overlay').classList.remove('visible'); document.body.style.overflow = ''; curSourceCode = ''; const h = window.location.hash.split('#').filter(Boolean); history.pushState(null, '', h.length ? '#' + h[0] : '#scripts'); }
        function handleSourceOverlayClick(e) { if (e.target === document.getElementById('source-overlay')) closeSourceViewer(); }

        const btnActionWrap = async (id, html, successMsg, failMsg, fn) => {
            try { await fn(); const btn = document.getElementById(id); btn.classList.add('copied'); btn.innerHTML = html; lucide.createIcons(); showToast(successMsg); setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = id === 'source-copy-btn' ? '<span class="copy-icon"></span>' : '<i data-lucide="share-2"></i>'; lucide.createIcons(); }, 2000); } catch { showToast(failMsg); }
        };
        const copySourceCode = () => curSourceCode && btnActionWrap('source-copy-btn', '<i data-lucide="check"></i>', 'Code copied!', 'Failed to copy.', () => navigator.clipboard.writeText(curSourceCode));
        const shareSourceCode = () => btnActionWrap('source-share-btn', '<i data-lucide="check"></i>', 'Link copied!', 'Failed to copy link.', () => navigator.clipboard.writeText(location.href));
    </script>
</body>

</html>
